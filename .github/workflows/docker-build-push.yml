name: Build → Push → Deploy

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: itechsmart/letta-ingest:latest

      - name: Trigger deploy webhook
        run: |
          PAYLOAD=$(printf '{"service":"suite_letta","image":"itechsmart/letta-ingest:latest","sha":"%s"}' "${{ github.sha }}")
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          STATUS=$(curl -sf -o /tmp/wh.txt -w "%{http_code}"             -X POST "https://hooks.itechsmart.dev/hook"             -H "Content-Type: application/json"             -H "X-Hub-Signature-256: sha256=${SIG}"             -d "$PAYLOAD")
          cat /tmp/wh.txt
          [ "$STATUS" = "200" ] || exit 1
          echo "| deploy service | suite_letta |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy image | itechsmart/letta-ingest:latest |" >> $GITHUB_STEP_SUMMARY
